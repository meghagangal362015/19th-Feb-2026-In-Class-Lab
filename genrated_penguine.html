<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Penguin</title>
</head>
<body>
  <div>
    <h1>This Penguin thinks its cold outside. Couldn't agree more with it.</h1>
    <svg width="280" height="320" viewBox="0 0 280 320" xmlns="http://www.w3.org/2000/svg">
      <!-- Background circle (optional ice/snow feel) -->
      <ellipse cx="140" cy="280" rx="100" ry="20" fill="rgba(255,255,255,0.5)" />

      <!-- Body (black oval) -->
      <ellipse cx="140" cy="180" rx="75" ry="120" fill="#1a1a1a" />

      <!-- White belly patch -->
      <ellipse cx="140" cy="200" rx="45" ry="75" fill="#ffffff" />

      <!-- Head (black circle) -->
      <circle cx="140" cy="85" r="55" fill="#1a1a1a" />

      <!-- Left eye - big, slightly oval, white + pupil -->
      <ellipse cx="115" cy="82" rx="20" ry="22" fill="#ffffff" />
      <ellipse cx="116" cy="84" rx="8" ry="9" fill="#1a1a1a" />
      <!-- Right eye - big, slightly oval -->
      <ellipse cx="165" cy="82" rx="20" ry="22" fill="#ffffff" />
      <ellipse cx="164" cy="84" rx="8" ry="9" fill="#1a1a1a" />

      <!-- Yellow nose/beak -->
      <path d="M 130 100 L 140 125 L 150 100 Z" fill="#FFD93D" stroke="#E6C235" stroke-width="1.5" />

      <!-- Left hand (flipper) - black, bigger, overlapping white belly -->
      <ellipse cx="98" cy="165" rx="28" ry="15" fill="#1a1a1a" transform="rotate(30 98 165)" />
      <!-- Right hand - black, bigger, overlapping white belly -->
      <ellipse cx="182" cy="165" rx="28" ry="15" fill="#1a1a1a" transform="rotate(-30 182 165)" />

      <!-- Left leg - yellow vertical oval, rotated like \ -->
      <ellipse cx="118" cy="282" rx="9" ry="20" fill="#FFD93D" transform="rotate(25 118 282)" />
      <!-- Right leg - yellow vertical oval, rotated like / -->
      <ellipse cx="162" cy="282" rx="9" ry="20" fill="#FFD93D" transform="rotate(-25 162 282)" />
    </svg>
  </div>
</body>
</html>

</body>
</html>
